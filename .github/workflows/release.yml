name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    # Skip commits that are themselves version bumps
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        run: |
          CURRENT=$(grep '"version"' manifest.json | sed 's/.*"version": "\(.*\)".*/\1/')

          # Normalise to MAJOR.MINOR.PATCH
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          # Commits since last tag (or all commits if no tags exist yet)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "$LAST_TAG"..HEAD)
          fi

          # Determine bump level
          if echo "$COMMITS" | grep -qE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE"; then
            NEW="$((MAJOR + 1)).0.0"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            NEW="$MAJOR.$((MINOR + 1)).0"
          else
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"         >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW"

      - name: Update manifest.json
        run: |
          sed -i 's/"version": "${{ steps.bump.outputs.current }}"/"version": "${{ steps.bump.outputs.new }}"/' manifest.json

      - name: Commit, tag, and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }} [skip ci]"
          git tag "v${{ steps.bump.outputs.new }}"
          git push origin main --follow-tags

      - name: Build zip
        run: |
          VERSION="${{ steps.bump.outputs.new }}"
          zip -r "url-reading-tracker-v${VERSION}.zip" . \
            --exclude "*.git*" \
            --exclude "*.sh"   \
            --exclude "*.md"   \
            --exclude ".claude/*" \
            --exclude ".github/*"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.new }}"
          name: "v${{ steps.bump.outputs.new }}"
          generate_release_notes: true
          files: "url-reading-tracker-v${{ steps.bump.outputs.new }}.zip"

      - name: Submit to Firefox Add-ons (AMO)
        run: |
          npm install -g web-ext
          web-ext sign \
            --source-dir . \
            --api-key "${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret "${{ secrets.AMO_JWT_SECRET }}" \
            --channel listed
