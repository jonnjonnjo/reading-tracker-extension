<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Reading Tracker Settings</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, sans-serif;
        background: #0f0f0f;
        color: #e8e8e8;
        padding: 24px;
        max-width: 400px;
      }

      label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; }
      label + label { margin-top: 16px; }

      input {
        width: 100%;
        padding: 8px;
        background: #1a1a1a;
        border: 1px solid #2e2e2e;
        border-radius: 6px;
        color: #e8e8e8;
        font-family: monospace;
        font-size: 13px;
        outline: none;
      }

      input:focus { border-color: #555; }

      button {
        margin-top: 16px;
        padding: 9px 18px;
        background: #e8e8e8;
        color: #0f0f0f;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover { background: #ccc; }

      #statusEl { margin-top: 12px; font-size: 12px; color: #888; }
    </style>
  </head>
  <body>
    <label for="apiBase">API Base URL</label>
    <input type="text" id="apiBase" placeholder="https://api.example.com" />
    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="Paste your API key here" />
    <button id="save">Save</button>
    <div id="statusEl"></div>
    <script src="options.js"></script>
  </body>
</html>
