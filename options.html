<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Reading Tracker Settings</title>
    <style>
      body { font-family: sans-serif; padding: 24px; max-width: 400px; }
      label { display: block; margin-bottom: 6px; font-weight: bold; }
      input { width: 100%; padding: 8px; box-sizing: border-box; font-family: monospace; }
      button { margin-top: 12px; padding: 8px 16px; cursor: pointer; }
      #status { margin-top: 10px; font-size: 0.9em; color: green; }
    </style>
  </head>
  <body>
    <label for="apiBase">API Base URL</label>
    <input type="text" id="apiBase" placeholder="https://api.example.com" />
    <label for="apiKey" style="margin-top: 16px;">API Key</label>
    <input type="password" id="apiKey" placeholder="Paste your API key here" />
    <button id="save">Save</button>
    <div id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
