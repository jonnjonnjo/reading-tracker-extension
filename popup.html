<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, sans-serif;
        background: #0f0f0f;
        color: #e8e8e8;
        width: 280px;
        padding: 16px;
      }

      #page-title {
        font-size: 12px;
        color: #888;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 12px;
      }

      textarea {
        width: 100%;
        height: 72px;
        background: #1a1a1a;
        border: 1px solid #2e2e2e;
        border-radius: 6px;
        color: #e8e8e8;
        font-family: inherit;
        font-size: 13px;
        padding: 8px;
        resize: none;
        outline: none;
        margin-bottom: 10px;
      }

      textarea::placeholder { color: #555; }
      textarea:focus { border-color: #555; }

      button {
        width: 100%;
        padding: 9px;
        background: #e8e8e8;
        color: #0f0f0f;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover { background: #ccc; }
      button:disabled { opacity: 0.5; cursor: default; }

      #statusEl {
        margin-top: 10px;
        font-size: 12px;
        color: #888;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="page-title">Loading...</div>
    <textarea id="notes" placeholder="Notes (optional)"></textarea>
    <button id="markRead">Mark as read</button>
    <div id="statusEl"></div>
    <script src="popup.js"></script>
  </body>
</html>
